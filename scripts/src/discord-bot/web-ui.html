<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="referrer" content="no-referrer"/>
<meta name="robots" content="noindex,nofollow"/>
<title>EverGuard Search</title>
<style>
:root {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222; --border: #2a2a2a;
  --accent: #5865f2; --accent2: #4752c4; --text: #e8e8e8; --muted: #888; --muted2: #555;
  --skeleton: #222; --skeleton2: #2c2c2c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; }

/* ── Header ──────────────────────────────────────────────────────────────── */
header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: .65rem 1rem; display: flex; align-items: center; gap: .5rem;
  position: sticky; top: 0; z-index: 50;
}
header h1 { font-size: .95rem; font-weight: 700; color: var(--accent); letter-spacing: -.01em; }
.privacy-badge {
  margin-left: auto; display: flex; align-items: center; gap: .3rem;
  font-size: .72rem; font-weight: 600; color: #2ecc71;
  background: rgba(46,204,113,.12); border: 1px solid rgba(46,204,113,.25);
  border-radius: 20px; padding: .22rem .6rem; cursor: default; flex-shrink: 0;
  user-select: none;
}

/* ── Search area ──────────────────────────────────────────────────────────── */
.search-area { max-width: 780px; margin: 1.5rem auto 0; padding: 0 .85rem; }
.search-row { display: flex; gap: .4rem; position: relative; }
.search-row input {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 1rem;
  padding: .75rem 1rem; outline: none; transition: border-color .15s;
  min-width: 0; -webkit-appearance: none;
}
.search-row input::placeholder { color: var(--muted); }
.search-row input:focus { border-color: var(--accent); }
.search-row button {
  background: var(--accent); border: none; border-radius: 8px; color: #fff;
  cursor: pointer; font-size: .95rem; font-weight: 600; padding: .75rem 1.2rem;
  transition: background .15s; white-space: nowrap; flex-shrink: 0; touch-action: manipulation;
}
.search-row button:hover { background: var(--accent2); }
.search-row button:active { background: var(--accent2); }
.search-row button:disabled { opacity: .5; cursor: default; }

/* Autocomplete */
.autocomplete {
  position: absolute; top: calc(100% + 4px); left: 0;
  right: 0; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,.5);
  z-index: 100; overflow: hidden; display: none;
}
.autocomplete.open { display: block; }
.ac-item {
  padding: .65rem 1rem; cursor: pointer; font-size: .9rem; color: var(--text);
  display: flex; align-items: center; gap: .5rem;
}
.ac-item:hover, .ac-item.focused { background: var(--surface2); }
.ac-item svg { flex-shrink: 0; color: var(--muted); }

/* Source chips */
.source-chips {
  display: flex; gap: .4rem; margin-top: .7rem;
  overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; -webkit-overflow-scrolling: touch;
}
.source-chips::-webkit-scrollbar { display: none; }
.chip {
  border: 1px solid var(--border); border-radius: 20px; background: var(--surface);
  color: var(--muted); cursor: pointer; font-size: .78rem; font-weight: 600;
  padding: .32rem .8rem; white-space: nowrap; transition: all .15s; flex-shrink: 0;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}
.chip:hover { border-color: #444; color: var(--text); }
.chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.chip-ph.active     { background: #ff9000; border-color: #ff9000; color: #000; }
.chip-xv.active     { background: #cc0000; border-color: #cc0000; color: #fff; }
.chip-xnxx.active   { background: #f5c518; border-color: #f5c518; color: #000; }
.chip-xxbrits.active{ background: #1e90ff; border-color: #1e90ff; color: #fff; }
.chip-fpoxxx.active { background: #9b59b6; border-color: #9b59b6; color: #fff; }
.chip-freepornvideos.active { background: #e74c3c; border-color: #e74c3c; color: #fff; }

/* ── Status bar ───────────────────────────────────────────────────────────── */
#status { text-align: center; color: var(--muted); padding: 1.25rem 1rem .4rem; font-size: .85rem; min-height: 2.5rem; }

/* ── Section heading ──────────────────────────────────────────────────────── */
.section-head {
  display: flex; align-items: center; gap: .5rem;
  max-width: 1200px; margin: .75rem auto .5rem; padding: 0 .85rem;
  font-size: .93rem; font-weight: 700; color: var(--text);
}
.section-head span { color: var(--muted); font-weight: 400; font-size: .8rem; margin-left: auto; }

/* ── Card grid ────────────────────────────────────────────────────────────── */
.grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: .75rem; max-width: 1200px; margin: 0 auto; padding: 0 .85rem;
}
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  overflow: hidden; cursor: pointer; transition: transform .15s, border-color .15s, box-shadow .15s;
  -webkit-tap-highlight-color: transparent;
}
.card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 6px 18px rgba(88,101,242,.15); }
.card:active { transform: translateY(-1px); }
.thumb-wrap { position: relative; width: 100%; aspect-ratio: 16/9; background: #1c1c1c; overflow: hidden; }
.thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.thumb-wrap .no-thumb { display: flex; align-items: center; justify-content: center; height: 100%; color: #444; font-size: 2rem; }
.play-overlay { position: absolute; inset: 0; background: transparent; display: flex; align-items: center; justify-content: center; transition: background .15s; }
.card:hover .play-overlay { background: rgba(0,0,0,.35); }
.play-overlay svg { opacity: 0; transition: opacity .15s; }
.card:hover .play-overlay svg { opacity: 1; }
.dur-badge { position: absolute; bottom: 5px; right: 6px; background: rgba(0,0,0,.78); border-radius: 4px; color: #fff; font-size: .67rem; font-weight: 600; padding: 1px 5px; }
.card-info { padding: .5rem .6rem .55rem; }
.card-title { font-size: .78rem; font-weight: 500; line-height: 1.38; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-meta { display: flex; align-items: center; gap: .35rem; margin-top: .3rem; }
.badge { border-radius: 4px; font-size: .62rem; font-weight: 700; padding: 1px 5px; text-transform: uppercase; letter-spacing: .02em; }
.badge-pornhub  { background: #ff9000; color: #000; }
.badge-xvideos  { background: #cc0000; color: #fff; }
.badge-xnxx     { background: #f5c518; color: #000; }
.badge-xxbrits  { background: #1e90ff; color: #fff; }
.badge-fpoxxx          { background: #9b59b6; color: #fff; }
.badge-freepornvideos  { background: #e74c3c; color: #fff; }
.card-actors { font-size: .68rem; color: var(--muted); margin-top: .2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── Skeleton loading ─────────────────────────────────────────────────────── */
@keyframes shimmer {
  0%   { background-position: -600px 0; }
  100% { background-position:  600px 0; }
}
.skeleton {
  background: linear-gradient(90deg, var(--skeleton) 25%, var(--skeleton2) 50%, var(--skeleton) 75%);
  background-size: 600px 100%;
  animation: shimmer 1.4s infinite linear;
  border-radius: 4px;
}
.skeleton-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
}
.skeleton-thumb {
  width: 100%; aspect-ratio: 16/9;
  background: linear-gradient(90deg, var(--skeleton) 25%, var(--skeleton2) 50%, var(--skeleton) 75%);
  background-size: 600px 100%;
  animation: shimmer 1.4s infinite linear;
}
.skeleton-info { padding: .5rem .6rem .55rem; display: flex; flex-direction: column; gap: .35rem; }
.skeleton-line {
  height: .7rem; border-radius: 3px;
  background: linear-gradient(90deg, var(--skeleton) 25%, var(--skeleton2) 50%, var(--skeleton) 75%);
  background-size: 600px 100%;
  animation: shimmer 1.4s infinite linear;
}
.skeleton-line.short { width: 40%; }

/* ── Pagination ───────────────────────────────────────────────────────────── */
.pagination {
  display: flex; align-items: center; justify-content: center;
  gap: .3rem; padding: 1.5rem .75rem 3rem; flex-wrap: wrap;
}
.pg-btn {
  background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); cursor: pointer; font-size: .85rem; font-weight: 500;
  min-width: 38px; height: 38px; padding: 0 .5rem;
  display: inline-flex; align-items: center; justify-content: center;
  transition: background .15s, border-color .15s; user-select: none;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}
.pg-btn:hover:not(:disabled):not(.active) { background: var(--surface2); border-color: #444; }
.pg-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; cursor: default; }
.pg-btn:disabled { opacity: .3; cursor: default; }
.pg-dots { color: var(--muted); font-size: .85rem; padding: 0 .1rem; user-select: none; }

/* ── Loading overlay for page transition ──────────────────────────────────── */
#page-loading {
  display: none; position: fixed; top: 0; left: 0; right: 0; height: 3px;
  background: var(--accent); z-index: 999;
  animation: progress-bar 1.2s ease-in-out infinite;
}
@keyframes progress-bar {
  0%   { transform: scaleX(0); transform-origin: left; }
  50%  { transform: scaleX(.7); transform-origin: left; }
  100% { transform: scaleX(1); transform-origin: left; opacity: 0; }
}
#page-loading.active { display: block; }

/* ── Video page (full overlay) ────────────────────────────────────────────── */
.vp-overlay {
  display: none; position: fixed; inset: 0; background: var(--bg);
  z-index: 200; overflow: hidden;
}
.vp-overlay.open { display: flex; flex-direction: column; }
.vp-topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: .6rem 1rem; display: flex; align-items: center; gap: .65rem;
  flex-shrink: 0;
}
.vp-back {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); cursor: pointer; font-size: .83rem; padding: .38rem .75rem;
  transition: background .15s; white-space: nowrap; flex-shrink: 0;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}
.vp-back:hover { background: var(--surface2); }
.vp-topbar-title {
  font-size: .88rem; font-weight: 600; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0;
}
.vp-body {
  display: flex; flex: 1; overflow: hidden;
}
.vp-left {
  flex: 0 0 65%; display: flex; flex-direction: column; overflow-y: auto; border-right: 1px solid var(--border);
}
.vp-player-wrap {
  position: relative; width: 100%; aspect-ratio: 16/9;
  background: #000; flex-shrink: 0;
}
.vp-player-wrap video { width: 100%; height: 100%; display: none; }
.vp-vid-status {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: .75rem; color: var(--muted);
}
.vp-vid-status a { color: var(--accent); }
.spinner { width: 34px; height: 34px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.vp-info { padding: .85rem 1rem; border-bottom: 1px solid var(--border); }
.vp-info h2 { font-size: 1rem; font-weight: 700; line-height: 1.35; margin-bottom: .3rem; }
.vp-actors { font-size: .78rem; color: var(--muted); margin-bottom: .45rem; }
.vp-actors span { color: var(--accent); font-weight: 600; cursor: pointer; }
.vp-actors span:hover { text-decoration: underline; }
.vp-info-meta { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; }
.vp-info-meta a { color: var(--accent); font-size: .82rem; text-decoration: none; }
.vp-info-meta a:hover { text-decoration: underline; }
.ext-warn {
  font-size: .65rem; font-weight: 700; background: rgba(231,76,60,.18);
  color: #e74c3c; border: 1px solid rgba(231,76,60,.3); border-radius: 3px;
  padding: 1px 4px; margin-left: .3rem; vertical-align: middle; white-space: nowrap;
}
.privacy-note {
  display: flex; align-items: center; gap: .35rem; margin-top: .5rem;
  font-size: .72rem; color: #2ecc71; opacity: .85;
}

/* ── Find on site ─────────────────────────────────────────────────────────── */
.find-on-wrap {
  margin-top: .7rem; display: flex; align-items: center; gap: .5rem; flex-wrap: wrap;
}
.find-on-label { font-size: .73rem; color: var(--muted); font-weight: 600; white-space: nowrap; flex-shrink: 0; }
.fon-chip {
  border: 1px solid var(--border); border-radius: 20px; background: var(--surface2);
  color: var(--text); cursor: pointer; font-size: .71rem; font-weight: 600;
  padding: .24rem .62rem; white-space: nowrap; transition: all .15s; flex-shrink: 0;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}
.fon-chip:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.fon-chip:disabled { opacity: .45; cursor: wait; }
.fon-chip.fon-active { background: var(--accent); border-color: var(--accent); color: #fff; cursor: default; }
.fon-thumb-ref {
  display: flex; align-items: flex-start; gap: .8rem; margin-top: .5rem;
  font-size: .72rem; color: var(--muted); flex-wrap: wrap;
}
.fon-thumb-block { display: flex; flex-direction: column; gap: .2rem; align-items: center; flex-shrink: 0; }
.fon-thumb-block span { font-size: .66rem; color: var(--muted); font-weight: 600; }
.fon-thumb-ref img {
  width: 80px; aspect-ratio: 16/9; object-fit: cover; border-radius: 4px;
  border: 1px solid var(--border);
}
.fon-match-badge {
  display: inline-block; font-size: .65rem; font-weight: 700; border-radius: 4px;
  padding: 1px 5px; margin-top: .15rem;
}
.fon-match-high { background: rgba(46,204,113,.18); color: #2ecc71; border: 1px solid rgba(46,204,113,.35); }
.fon-match-mid  { background: rgba(241,196,15,.18);  color: #d4a017;  border: 1px solid rgba(241,196,15,.35); }
.fon-match-low  { background: rgba(231,76,60,.15);   color: #e74c3c;  border: 1px solid rgba(231,76,60,.3);  }
.fon-status { font-size: .75rem; color: var(--muted); margin-top: .3rem; min-height: 1.1em; }

.vp-right {
  flex: 0 0 35%; display: flex; flex-direction: column; overflow: hidden;
}
.vp-related-head {
  padding: .7rem 1rem; font-size: .88rem; font-weight: 700;
  border-bottom: 1px solid var(--border); flex-shrink: 0; color: var(--text);
}
.vp-related-list { flex: 1; overflow-y: auto; padding: .5rem; -webkit-overflow-scrolling: touch; }
.related-card {
  display: flex; gap: .6rem; padding: .5rem; border-radius: 8px;
  cursor: pointer; transition: background .15s; align-items: flex-start;
  -webkit-tap-highlight-color: transparent;
}
.related-card:hover { background: var(--surface2); }
.related-thumb {
  width: 110px; aspect-ratio: 16/9; border-radius: 6px; overflow: hidden;
  background: #1c1c1c; flex-shrink: 0; position: relative;
}
.related-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.related-thumb .no-thumb { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #444; }
.related-thumb .dur-badge { position: absolute; bottom: 3px; right: 4px; }
.related-info { flex: 1; min-width: 0; }
.related-title { font-size: .78rem; font-weight: 500; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.related-meta { margin-top: .3rem; }
.related-loading { padding: 1.5rem; text-align: center; color: var(--muted); font-size: .85rem; display: flex; flex-direction: column; align-items: center; gap: .5rem; }

/* ── Responsive ───────────────────────────────────────────────────────────── */
@media (max-width: 900px) {
  .vp-left  { flex: 0 0 58%; }
  .vp-right { flex: 0 0 42%; }
  .related-thumb { width: 88px; }
}
@media (max-width: 680px) {
  .search-area { margin-top: 1rem; }
  .autocomplete { right: 0; }
  .grid { grid-template-columns: repeat(2, 1fr); gap: .5rem; }
  .card-title { font-size: .76rem; }
  .pagination { padding: 1rem .5rem 2.5rem; gap: .25rem; }
  .pg-btn { min-width: 36px; height: 36px; font-size: .82rem; }
  /* Video page — stack vertically */
  .vp-overlay { overflow-y: auto; }
  .vp-topbar { position: sticky; top: 0; z-index: 10; padding: .55rem .85rem; }
  .vp-body { flex-direction: column; overflow: visible; height: auto; }
  .vp-left { flex: none; border-right: none; overflow-y: visible; width: 100%; }
  .vp-right { flex: none; overflow: visible; max-height: none; border-top: 1px solid var(--border); width: 100%; }
  .vp-related-list { overflow: visible; display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; padding: .5rem; }
  .related-card { flex-direction: column; padding: .35rem; }
  .related-thumb { width: 100%; aspect-ratio: 16/9; }
  .related-title { -webkit-line-clamp: 2; font-size: .74rem; }
  .vp-player-wrap { aspect-ratio: 16/9; }
  .vp-info { padding: .65rem .85rem; }
  .vp-info h2 { font-size: .88rem; }
  .vp-related-head { padding: .6rem .85rem; }
  .vp-info-meta a { font-size: .8rem; }
  /* Pagination: hide number pages, show prev/next + current only */
  .pg-dots { display: none; }
  .pg-btn.pg-num:not(.active):not(.pg-near) { display: none; }
}
@media (max-width: 420px) {
  .grid { gap: .35rem; }
  .card-title { font-size: .72rem; }
  .search-row input { font-size: .93rem; }
  .vp-related-list { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

  /* ── Canvas thumbnail comparison ─────────────────────────────────────────── */
  function compareThumbnails(url1, url2) {
    return new Promise(function(resolve) {
      var W = 48, H = 27; // larger grid → more accurate perceptual comparison
      var canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      var ctx = canvas.getContext('2d');

      function loadImg(url) {
        return new Promise(function(res, rej) {
          var img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = function() { res(img); };
          img.onerror = rej;
          img.src = url;
        });
      }

      function toGray(img) {
        ctx.clearRect(0, 0, W, H);
        ctx.drawImage(img, 0, 0, W, H);
        var d = ctx.getImageData(0, 0, W, H).data;
        var g = new Float32Array(W * H);
        for (var i = 0; i < g.length; i++) g[i] = 0.299 * d[i*4] + 0.587 * d[i*4+1] + 0.114 * d[i*4+2];
        return g;
      }

      Promise.all([loadImg(url1), loadImg(url2)])
        .then(function(imgs) {
          var g1 = toGray(imgs[0]);
          var g2 = toGray(imgs[1]);
          // Pearson correlation — handles brightness/contrast differences between CDNs
          var n = g1.length, s1 = 0, s2 = 0;
          for (var i = 0; i < n; i++) { s1 += g1[i]; s2 += g2[i]; }
          var m1 = s1 / n, m2 = s2 / n;
          var num = 0, d1 = 0, d2 = 0;
          for (var j = 0; j < n; j++) {
            var a = g1[j] - m1, b = g2[j] - m2;
            num += a * b; d1 += a * a; d2 += b * b;
          }
          var corr = (d1 === 0 || d2 === 0) ? 0 : num / Math.sqrt(d1 * d2);
          resolve(Math.round(((corr + 1) / 2) * 100)); // map [-1,1] → [0,100]
        })
        .catch(function() { resolve(null); });

  }

  /* ── Title word-overlap score (0–100) ─────────────────────────────────────── */
  function titleSimilarity(a, b) {

    if (!wa.length) return 0;
    var hits = wa.filter(function(w) { return wb.has(w); }).length;

    var t = title.replace(/^\[[^\]]+\]\s*[-–]?\s*/, '').trim();

    // Step 2: split on " - " — first segment is almost always studio/channel, skip it
    var segments = t.split(/\s*[-–]\s*/);
    var contentSegs = segments.length > 1 ? segments.slice(1) : segments;
    var content = contentSegs.join(' ');

    // Step 3: if real actor names exist in the content segments, use them — most specific
    var actors = extractActorsFromTitle(title);
    if (actors.length) return actors.join(' ');

    // Step 4: fall back to content keywords (skip generic/junk words)
    var STOP = new Set(['the','and','for','with','that','this','from','but','all','not','are','was',
      'she','her','his','him','they','video','xxx','sex','full','hdd','hot','big','gets','get',
      'having','being','making','teen','milf','fuck','fucking','fucked','cock','pussy','ass']);
    var words = content.toLowerCase().replace(/[^a-z0-9\s]/g, ' ').split(/\s+/)
      .filter(function(w) { return w.length >= 3 && !STOP.has(w); });
    return words.slice(0, 5).join(' ') || title.slice(0, 60);
  }

  /* ── Find this video on another site ────────────────────────────────────── */
  function findOnSite(src, label) {
    if (fonFetching || !currentVideoData) return;
    fonFetching = true;

    // Show original thumbnail reference immediately
    var origThumbProxied = currentVideoData.thumbnail ? thumbUrl(currentVideoData.thumbnail) : null;
    if (origThumbProxied) {
      vpFonThumbOrig.src = origThumbProxied;
      vpFonThumbFound.style.display = 'none';
      vpFonMatchLabel.style.display = 'none';
      vpFonThumb.style.display = 'flex';
    }
    vpFonStatus.textContent = 'Searching ' + label + '\u2026';
    vpFindOn.querySelectorAll('.fon-chip').forEach(function(c) { c.disabled = true; });

    var searchQ = buildFindQuery(currentVideoData.title);

    fetch('/api/search?q=' + _enc(searchQ) + '&source=' + encodeURIComponent(src) + '&page=0')
      .then(function(res) { return res.json(); })
      .then(function(data) {
        var results = (data.results || []).slice(0, 12); // wider candidate pool
        if (!results.length) {
          vpFonStatus.textContent = 'No results found on ' + label + '.';
          vpFindOn.querySelectorAll('.fon-chip').forEach(function(c) { c.disabled = false; });
          fonFetching = false;
          return;
        }

        vpFonStatus.textContent = 'Comparing results\u2026';

        // Pre-score every candidate by title similarity (always available)
        var titledScored = results.map(function(r) {
          return { r: r, titleSim: titleSimilarity(currentVideoData.title, r.title), thumbScore: null };
        });

        // Thumbnail-compare candidates that have thumbnails
        var candidates = titledScored.filter(function(x) { return !!x.r.thumbnail; });
        if (!candidates.length || !origThumbProxied) {
          // No thumbnails — pick by title similarity
          titledScored.sort(function(a, b) { return b.titleSim - a.titleSim; });
          pickAndPlay(titledScored[0].r, null, src, label);
          return;
        }

        Promise.all(candidates.map(function(x) {
          return compareThumbnails(origThumbProxied, thumbUrl(x.r.thumbnail))
            .then(function(score) { x.thumbScore = score; return x; });
        })).then(function(compared) {
          // Combined score: 55% thumbnail visual similarity + 45% title word overlap
          // null thumbScore falls back to title-only ranking
          compared.forEach(function(x) {
            x.combined = x.thumbScore !== null
              ? x.thumbScore * 0.55 + x.titleSim * 0.45
              : x.titleSim;
          });
          // Also include no-thumbnail candidates (title-only scored)
          var noThumb = titledScored.filter(function(x) { return !x.r.thumbnail; });
          noThumb.forEach(function(x) { x.combined = x.titleSim; });
          var all = compared.concat(noThumb);
          all.sort(function(a, b) { return b.combined - a.combined; });
          var best = all[0];
          // Report the thumbnail score if we have one, else report title similarity
          var displayScore = best.thumbScore !== null ? best.thumbScore : null;
          pickAndPlay(best.r, displayScore, src, label);
        });
      })
      .catch(function() {
        vpFonStatus.textContent = 'Search failed. Try again.';
        vpFindOn.querySelectorAll('.fon-chip').forEach(function(c) { c.disabled = false; });
        fonFetching = false;
      });
  }

  function pickAndPlay(best, score, src, label) {
    // Show found thumbnail + similarity badge
    if (best.thumbnail) {
      vpFonThumbFound.src = thumbUrl(best.thumbnail);
      vpFonThumbFound.style.display = 'block';
      if (score !== null) {
        var cls = score >= 70 ? 'fon-match-high' : score >= 45 ? 'fon-match-mid' : 'fon-match-low';
        var emoji = score >= 70 ? '✓' : score >= 45 ? '~' : '?';
        vpFonMatchLabel.className = 'fon-match-badge ' + cls;
        vpFonMatchLabel.textContent = emoji + ' ' + score + '% match';
        vpFonMatchLabel.style.display = 'inline-block';
      }
    }

    var shortTitle = best.title.slice(0, 55) + (best.title.length > 55 ? '\u2026' : '');
    var matchNote = score !== null ? ' (' + score + '% thumbnail match)' : '';
    vpFonStatus.textContent = 'Found: ' + shortTitle + matchNote;

    var oldData = currentVideoData;
    currentVideoData = Object.assign({}, oldData, {
      url: best.url,
      source: best.src || src,
      duration: best.duration || oldData.duration,
      thumbnail: best.thumbnail || oldData.thumbnail,
    });
    vpLink.href = best.url;

    vpFindOn.querySelectorAll('.fon-chip').forEach(function(c) {
      c.disabled = false;
      c.classList.remove('fon-active');
      if (c.dataset.src === src) c.classList.add('fon-active');
    });

    vpVid.pause();
    vpVid.removeAttribute('src');
    vpVid.load();
    vpVid.style.display = 'none';
    vpVidStatus.style.display = 'flex';
    vpVidStatus.innerHTML = '<div class="spinner"></div><span>Loading from ' + esc(label) + '\u2026</span>';

    fetch('/api/play-url?url=' + encodeURIComponent(best.url))
      .then(function(res) { return res.json(); })
      .then(function(d) {
        fonFetching = false;
        if (d.playUrl) {
          vpVid.src = d.playUrl;
          vpVid.style.display = 'block';
          vpVidStatus.style.display = 'none';
          vpVid.play().catch(function() {});
        } else {
          vpVidStatus.innerHTML = '<span>Could not play from ' + esc(label) + '. <a href="' + esc(best.url) + '" target="_blank" rel="noopener">Open page</a></span>';
        }
      })
      .catch(function() {
        fonFetching = false;
        vpVidStatus.innerHTML = '<span>Failed to load from ' + esc(label) + '.</span>';
      });
  }

  function loadRelated(r) {
    var keywords = extractKeywords(r.title);
    if (!keywords) { vpRelated.innerHTML = ''; return; }
    var src = (currentSource && currentSource !== 'all') ? currentSource : (r.source || '');
    var url = '/api/search?q=' + encodeURIComponent(keywords) + '&page=0';
    if (src) url += '&source=' + encodeURIComponent(src);
    fetch(url)
      .then(function(res) { return res.json(); })
      .then(function(data) {
        var results = (data.results || []).filter(function(x) { return x.url !== r.url; }).slice(0, 16);
        if (!results.length) { vpRelated.innerHTML = '<div class="related-loading">No related videos found.</div>'; return; }
        vpRelated.innerHTML = '';
        results.forEach(function(rel) { vpRelated.appendChild(makeRelatedCard(rel)); });
      })
      .catch(function() { vpRelated.innerHTML = ''; });
  }

  function extractKeywords(title) {
    var STOP = new Set(['the','and','for','with','that','this','from','but','all','not','are','was','she','her','his','him','they']);
    var words = title.toLowerCase().replace(/[^a-z0-9\s]/g, ' ').split(/\s+/).filter(function(w) { return w.length >= 3 && !STOP.has(w); });
    return words.slice(0, 3).join(' ') || null;
  }

  function makeRelatedCard(r) {
    var wrap = document.createElement('div');
    wrap.className = 'related-card';
    var thumbInner = r.thumbnail
      ? '<img src="' + thumbUrl(r.thumbnail) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">'
      : '<div class="no-thumb">\u25b6</div>';
    var durHtml = r.duration ? '<span class="dur-badge">' + esc(r.duration) + '</span>' : '';
    wrap.innerHTML =
      '<div class="related-thumb">' + thumbInner + durHtml + '</div>' +
      '<div class="related-info">' +
        '<div class="related-title">' + esc(r.title) + '</div>' +
        '<div class="related-meta">' + badgeHtml(r.source) + '</div>' +
      '</div>';
    wrap.addEventListener('click', function() {
      vpVid.pause();
      openVideoPage(r);
    });
    return wrap;
  }

  function closeVideoPage() {
    vpOverlay.classList.remove('open');
    document.body.style.overflow = '';
    vpVid.pause();
    vpVid.removeAttribute('src');
    vpVid.load();
    vpVid.style.display = 'none';
    vpVidStatus.style.display = 'flex';
    vpVidStatus.innerHTML = '<div class="spinner"></div><span>Loading video\u2026</span>';
  }

  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeVideoPage(); });

  /* ── Exports ─────────────────────────────────────────────────────────────── */
  window.doSearch       = doSearch;
  window.closeVideoPage = closeVideoPage;

  /* ── Boot ────────────────────────────────────────────────────────────────── */
  loadTrending();
})();
</script>
