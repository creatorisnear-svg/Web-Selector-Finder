<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EverGuard Search</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2a2a2a;
    --accent: #5865f2;
    --accent-hover: #4752c4;
    --text: #e8e8e8;
    --muted: #888;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: .9rem 1.5rem;
    display: flex;
    align-items: center;
    gap: .65rem;
  }
  header svg { flex-shrink: 0; }
  header h1 { font-size: 1.05rem; font-weight: 700; color: var(--accent); letter-spacing: -.01em; }

  .hero {
    max-width: 680px;
    margin: 3rem auto 0;
    padding: 0 1rem;
    text-align: center;
  }
  .hero p { color: var(--muted); font-size: .88rem; margin-bottom: 1.25rem; }

  .search-row {
    display: flex;
    gap: .5rem;
  }
  .search-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: .97rem;
    padding: .7rem 1rem;
    outline: none;
    transition: border-color .15s;
  }
  .search-row input::placeholder { color: var(--muted); }
  .search-row input:focus { border-color: var(--accent); }
  .search-row button {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    font-size: .95rem;
    font-weight: 600;
    padding: .7rem 1.3rem;
    transition: background .15s;
    white-space: nowrap;
  }
  .search-row button:hover { background: var(--accent-hover); }
  .search-row button:disabled { opacity: .55; cursor: default; }

  #status {
    text-align: center;
    color: var(--muted);
    padding: 2.5rem 1rem;
    font-size: .88rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: .85rem;
    max-width: 1200px;
    margin: 1.75rem auto 3rem;
    padding: 0 1rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform .15s, border-color .15s, box-shadow .15s;
  }
  .card:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
    box-shadow: 0 6px 18px rgba(88,101,242,.18);
  }
  .thumb-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #1c1c1c;
    overflow: hidden;
  }
  .thumb-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .thumb-wrap .no-thumb {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #444;
    font-size: 2.2rem;
  }
  .thumb-wrap .play-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s;
  }
  .card:hover .play-overlay { background: rgba(0,0,0,.35); }
  .play-overlay svg { opacity: 0; transition: opacity .15s; }
  .card:hover .play-overlay svg { opacity: 1; }
  .dur-badge {
    position: absolute;
    bottom: 5px;
    right: 6px;
    background: rgba(0,0,0,.78);
    border-radius: 4px;
    color: #fff;
    font-size: .68rem;
    font-weight: 600;
    padding: 1px 5px;
  }
  .card-info {
    padding: .6rem .7rem .65rem;
  }
  .card-title {
    font-size: .81rem;
    font-weight: 500;
    line-height: 1.38;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    color: var(--text);
  }
  .card-meta {
    display: flex;
    align-items: center;
    gap: .4rem;
    margin-top: .4rem;
  }
  .badge {
    border-radius: 4px;
    font-size: .63rem;
    font-weight: 700;
    padding: 1px 5px;
    text-transform: uppercase;
    letter-spacing: .02em;
  }
  .badge-pornhub  { background: #ff9000; color: #000; }
  .badge-xvideos  { background: #cc0000; color: #fff; }
  .badge-xnxx     { background: #f5c518; color: #000; }
  .badge-xxbrits  { background: #1e90ff; color: #fff; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.88);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-width: 900px;
    width: 100%;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
  }
  .modal-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: .75rem;
    padding: .8rem 1rem .75rem;
  }
  .modal-top-left { display: flex; align-items: center; gap: .5rem; flex: 1; min-width: 0; }
  .modal-title { font-size: .88rem; font-weight: 600; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .close-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.2rem;
    line-height: 1;
    flex-shrink: 0;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color .15s, background .15s;
  }
  .close-btn:hover { color: var(--text); background: var(--surface2); }
  .modal-video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
  }
  .modal-video-wrap video {
    width: 100%;
    height: 100%;
    display: none;
  }
  .vid-status {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: .85rem;
    color: var(--muted);
    font-size: .88rem;
  }
  .vid-status a { color: var(--accent); }
  .spinner {
    width: 34px;
    height: 34px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .modal-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: .6rem 1rem;
    border-top: 1px solid var(--border);
    gap: .5rem;
  }
  .modal-bottom a {
    color: var(--accent);
    font-size: .8rem;
    text-decoration: none;
  }
  .modal-bottom a:hover { text-decoration: underline; }

  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .35rem;
    padding: .5rem 1rem 3rem;
    flex-wrap: wrap;
  }
  .pagination .pg-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    cursor: pointer;
    font-size: .88rem;
    font-weight: 500;
    min-width: 36px;
    height: 36px;
    padding: 0 .55rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background .15s, border-color .15s, color .15s;
    user-select: none;
  }
  .pagination .pg-btn:hover:not(:disabled):not(.active) {
    background: var(--surface2);
    border-color: #444;
  }
  .pagination .pg-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    cursor: default;
  }
  .pagination .pg-btn:disabled {
    opacity: .35;
    cursor: default;
  }
  .pagination .pg-dots {
    color: var(--muted);
    font-size: .88rem;
    padding: 0 .2rem;
    user-select: none;
  }
  @media (max-width: 600px) {
    .pagination { gap: .25rem; padding-bottom: 2rem; }
    .pagination .pg-btn { min-width: 32px; height: 32px; font-size: .82rem; }
  }

  @media (max-width: 600px) {
    .hero { margin-top: 1.25rem; }
    .hero p { font-size: .83rem; margin-bottom: 1rem; }
    .search-row { flex-direction: column; gap: .4rem; }
    .search-row input { font-size: .95rem; padding: .65rem .9rem; }
    .search-row button { padding: .65rem 1rem; font-size: .95rem; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: .5rem; margin: 1.25rem auto 2rem; }
    .card-title { font-size: .78rem; }
    .modal-overlay { padding: 0; align-items: flex-end; }
    .modal {
      border-radius: 16px 16px 0 0;
      max-height: 95dvh;
      overflow-y: auto;
    }
    .modal-top { padding: .7rem .85rem; }
    .modal-title { font-size: .82rem; }
    .modal-video-wrap { aspect-ratio: 16 / 10; }
    .modal-bottom { padding: .55rem .85rem; }
  }
  @media (max-width: 380px) {
    .grid { grid-template-columns: 1fr 1fr; gap: .35rem; }
    .card-title { font-size: .75rem; }
  }
</style>
</head>
<body>

<header>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5865f2" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
  </svg>
  <h1>EverGuard Search</h1>
</header>

<div class="hero">
  <p>Search across PornHub, Xvideos, XNXX &amp; XXBrits &mdash; no account, no tracking.</p>
  <div class="search-row">
    <input id="q" type="search" placeholder="Search videos..." autocomplete="off" spellcheck="false"/>
    <button id="search-btn" onclick="doSearch()">Search</button>
  </div>
</div>

<div id="status" class="status">Enter a search term above to get started.</div>
<div id="grid" class="grid"></div>
<div id="pagination" class="pagination" style="display:none"></div>

<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-top">
      <div class="modal-top-left">
        <span id="modal-badge"></span>
        <div class="modal-title" id="modal-title"></div>
      </div>
      <button class="close-btn" onclick="closeModal()" title="Close">&#x2715;</button>
    </div>
    <div class="modal-video-wrap">
      <div class="vid-status" id="vid-status">
        <div class="spinner"></div>
        <span>Loading video&hellip;</span>
      </div>
      <video id="vid" controls preload="auto"></video>
    </div>
    <div class="modal-bottom">
      <a id="modal-link" href="#" target="_blank" rel="noopener noreferrer">Open source page &#x2197;</a>
    </div>
  </div>
</div>

<script>
(function() {
  var qEl        = document.getElementById('q');
  var gridEl     = document.getElementById('grid');
  var statusEl   = document.getElementById('status');
  var searchBtn  = document.getElementById('search-btn');
  var paginEl    = document.getElementById('pagination');
  var modal      = document.getElementById('modal');
  var modalTitle = document.getElementById('modal-title');
  var modalBadge = document.getElementById('modal-badge');
  var modalLink  = document.getElementById('modal-link');
  var vidEl      = document.getElementById('vid');
  var vidStatus  = document.getElementById('vid-status');

  var BADGE = {
    pornhub: { cls: 'badge badge-pornhub', label: 'PH'      },
    xvideos: { cls: 'badge badge-xvideos', label: 'XV'      },
    xnxx:    { cls: 'badge badge-xnxx',    label: 'XNXX'   },
    xxbrits: { cls: 'badge badge-xxbrits', label: 'XXBrits' }
  };

  // ── State ──────────────────────────────────────────────────────────────────
  var currentQuery   = '';
  var currentPage    = 0;    // 0-indexed internally
  var maxKnownPage   = 0;    // highest page with results
  var hasNextPage    = false; // whether last fetch returned results

  qEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') doSearch(); });

  // ── New search (always page 0) ─────────────────────────────────────────────
  function doSearch() {
    var q = qEl.value.trim();
    if (!q) return;
    currentQuery  = q;
    currentPage   = 0;
    maxKnownPage  = 0;
    hasNextPage   = false;
    fetchPage(0);
  }

  // ── Go to a specific page ──────────────────────────────────────────────────
  function goToPage(p) {
    if (p < 0) return;
    currentPage = p;
    fetchPage(p);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── Fetch results for a page ───────────────────────────────────────────────
  function fetchPage(p) {
    gridEl.innerHTML = '';
    paginEl.style.display = 'none';
    statusEl.textContent = 'Searching\u2026';
    searchBtn.disabled = true;

    fetch('/api/search?q=' + encodeURIComponent(currentQuery) + '&page=' + p)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        searchBtn.disabled = false;
        var results = data.results || [];
        if (results.length === 0 && p === 0) {
          statusEl.textContent = 'No results found. Try a different search.';
          return;
        }
        if (results.length === 0) {
          // Went past the last page — jump back
          goToPage(maxKnownPage);
          return;
        }
        hasNextPage  = results.length > 0;
        if (p > maxKnownPage) maxKnownPage = p;
        statusEl.textContent = 'Page ' + (p + 1) + ' \u2014 ' + results.length + ' results';
        results.forEach(function(r) { gridEl.appendChild(makeCard(r)); });
        renderPagination();
      })
      .catch(function() {
        searchBtn.disabled = false;
        statusEl.textContent = 'Search failed. Please try again.';
      });
  }

  // ── Pagination bar (PH-style numbered pages) ──────────────────────────────
  function renderPagination() {
    paginEl.innerHTML = '';
    paginEl.style.display = 'flex';

    var cur    = currentPage;          // 0-indexed
    var dispCur = cur + 1;             // 1-indexed for display
    // We always show at least up to current page; if hasNextPage, one more exists
    var lastKnown = maxKnownPage + 1;  // 1-indexed highest confirmed page
    var showMax   = hasNextPage ? lastKnown + 1 : lastKnown; // speculative next

    // Build visible page numbers around current
    var pages = buildPageRange(dispCur, showMax);

    // ← Prev button
    var prev = btn('\u2190 Prev', cur === 0);
    prev.addEventListener('click', function() { if (cur > 0) goToPage(cur - 1); });
    paginEl.appendChild(prev);

    pages.forEach(function(item) {
      if (item === '\u2026') {
        var dots = document.createElement('span');
        dots.className = 'pg-dots';
        dots.textContent = '\u2026';
        paginEl.appendChild(dots);
      } else {
        var b = btn(String(item), false, item === dispCur);
        (function(pg) {
          b.addEventListener('click', function() { if (pg !== dispCur) goToPage(pg - 1); });
        })(item);
        paginEl.appendChild(b);
      }
    });

    // Next → button
    var next = btn('Next \u2192', !hasNextPage && cur >= maxKnownPage);
    next.addEventListener('click', function() { goToPage(cur + 1); });
    paginEl.appendChild(next);
  }

  // Returns array of page numbers (1-indexed) and '…' ellipsis strings
  function buildPageRange(cur, total) {
    if (total <= 7) {
      var out = [];
      for (var i = 1; i <= total; i++) out.push(i);
      return out;
    }
    var result = [];
    var delta = 2;
    var left  = cur - delta;
    var right = cur + delta;
    var pages = [];
    for (var i = 1; i <= total; i++) {
      if (i === 1 || i === total || (i >= left && i <= right)) pages.push(i);
    }
    var prev = 0;
    for (var j = 0; j < pages.length; j++) {
      if (pages[j] - prev > 1) result.push('\u2026');
      result.push(pages[j]);
      prev = pages[j];
    }
    return result;
  }

  function btn(label, disabled, active) {
    var b = document.createElement('button');
    b.className = 'pg-btn' + (active ? ' active' : '');
    b.textContent = label;
    b.disabled = !!disabled;
    return b;
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function makeCard(r) {
    var b = BADGE[r.source] || { cls: 'badge badge-xvideos', label: r.source || '' };
    var card = document.createElement('div');
    card.className = 'card';
    var thumbInner = r.thumbnail
      ? '<img src="' + esc(r.thumbnail) + '" alt="" loading="lazy" onerror="this.parentNode.innerHTML=\'<div class=no-thumb>\u25b6</div>\'">'
      : '<div class="no-thumb">\u25b6</div>';
    var durHtml = r.duration ? '<span class="dur-badge">' + esc(r.duration) + '</span>' : '';
    card.innerHTML =
      '<div class="thumb-wrap">' + thumbInner +
        '<div class="play-overlay">' +
          '<svg width="42" height="42" viewBox="0 0 42 42" fill="none">' +
            '<circle cx="21" cy="21" r="21" fill="rgba(0,0,0,.55)"/>' +
            '<polygon points="17,13 33,21 17,29" fill="white"/>' +
          '</svg>' +
        '</div>' + durHtml +
      '</div>' +
      '<div class="card-info">' +
        '<div class="card-title">' + esc(r.title) + '</div>' +
        '<div class="card-meta"><span class="' + b.cls + '">' + b.label + '</span></div>' +
      '</div>';
    card.addEventListener('click', function() { openVideo(r); });
    return card;
  }

  // ── Video player ───────────────────────────────────────────────────────────
  function openVideo(r) {
    var b = BADGE[r.source] || { cls: 'badge badge-xvideos', label: r.source || '' };
    modalTitle.textContent = r.title;
    modalBadge.className   = b.cls;
    modalBadge.textContent = b.label;
    modalLink.href = r.url;
    vidEl.style.display    = 'none';
    vidStatus.style.display = 'flex';
    vidStatus.innerHTML    = '<div class="spinner"></div><span>Loading video\u2026</span>';
    modal.classList.add('open');
    vidEl.pause();
    vidEl.removeAttribute('src');
    vidEl.load();

    fetch('/api/play-url?url=' + encodeURIComponent(r.url))
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.playUrl) {
          vidEl.src = data.playUrl;
          vidEl.style.display = 'block';
          vidStatus.style.display = 'none';
          vidEl.play().catch(function() {});
        } else {
          vidStatus.innerHTML = '<span>Could not load. <a href="' + esc(r.url) + '" target="_blank" rel="noopener">Open source page</a></span>';
        }
      })
      .catch(function() {
        vidStatus.innerHTML = '<span>Failed to load. <a href="' + esc(r.url) + '" target="_blank" rel="noopener">Open source page</a></span>';
      });
  }

  function closeModal() {
    modal.classList.remove('open');
    vidEl.pause();
    vidEl.removeAttribute('src');
    vidEl.load();
    vidEl.style.display    = 'none';
    vidStatus.style.display = 'flex';
    vidStatus.innerHTML    = '<div class="spinner"></div><span>Loading video\u2026</span>';
  }

  function handleOverlayClick(e) { if (e.target === modal) closeModal(); }
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

  window.doSearch           = doSearch;
  window.closeModal         = closeModal;
  window.handleOverlayClick = handleOverlayClick;
})();
</script>
</body>
</html>
